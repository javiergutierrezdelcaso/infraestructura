name: CD - Infraestructura PRE/PRO

on:
  push:
    branches: ["develop", "main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
      ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
      ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
      ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Select environment
        id: env
        run: |
          if [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            echo "dir=terraform/environments/pre" >> $GITHUB_OUTPUT
            echo "env=pre" >> $GITHUB_OUTPUT
          else
            echo "dir=terraform/environments/pro" >> $GITHUB_OUTPUT
            echo "env=pro" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Init
        working-directory: ${{ steps.env.outputs.dir }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ steps.env.outputs.dir }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ steps.env.outputs.dir }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ steps.env.outputs.dir }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Export Outputs
        working-directory: ${{ steps.env.outputs.dir }}
        run: terraform output -json > terraform-outputs.json

      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: ${{ steps.env.outputs.dir }}/terraform-outputs.json

  ansible-deploy:
    runs-on: ubuntu-latest
    needs: terraform-apply
    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Terraform Outputs
        uses: actions/download-artifact@v4
        with:
          name: terraform-outputs
          path: .

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible python3-pip jq

      - name: Set APP_URL (PRE)
        if: github.ref == 'refs/heads/develop'
        run: |
          echo "APP_URL=$(jq -r '.app_url.value' terraform-outputs.json)" >> $GITHUB_ENV

      - name: Set APP_URL (PRO)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "APP_URL=$(jq -r '.app_url.value' terraform-outputs.json)" >> $GITHUB_ENV

      - name: Run Ansible PRE
        if: github.ref == 'refs/heads/develop'
        run: |
          ansible-playbook \
            -i inventories/pre/hosts \
            site.yml \
            -e "app_url=${APP_URL}"

      - name: Run Ansible PRO
        if: github.ref == 'refs/heads/main'
        run: |
          ansible-playbook \
            -i inventories/pro/hosts \
            site.yml \
            -e "app_url=${APP_URL}"
