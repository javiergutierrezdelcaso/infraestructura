name: CD - Infraestructura

on:
  push:
    branches: ["develop", "main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:

  terraform-apply:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply PRE
        if: github.ref == 'refs/heads/develop'
        run: terraform apply -auto-approve -var="environment=pre"

      - name: Terraform Apply PRO
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -var="environment=pro"

      - name: Export Outputs
        run: terraform output -json > terraform-outputs.json

      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: terraform-outputs.json

  health-check:
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - name: Download Outputs
        uses: actions/download-artifact@v4
        with:
          name: terraform-outputs

      - name: Health Check
        run: |
          URL=$(jq -r '.pre_app_url.value // .pro_app_url.value' terraform-outputs.json)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://$URL)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed"
            exit 1
          fi

  rollback:
    runs-on: ubuntu-latest
    needs: health-check
    if: failure()

    steps:
      - name: Rollback to previous version
        run: echo "Rollback logic aquí (slots, versiones, etc.)"

  ansible-deploy:
    runs-on: ubuntu-latest
    needs: health-check
    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Terraform Outputs
        uses: actions/download-artifact@v4
        with:
          name: terraform-outputs
          path: .

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Set APP_URL (PRE)
        if: github.ref == 'refs/heads/develop'
        run: |
          echo "APP_URL=$(jq -r '.pre_app_url.value' terraform-outputs.json)" >> $GITHUB_ENV

      - name: Set APP_URL (PRO)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "APP_URL=$(jq -r '.pro_app_url.value' terraform-outputs.json)" >> $GITHUB_ENV

      - name: Run Ansible Validation (PRE)
        if: github.ref == 'refs/heads/develop'
        run: |
          ansible-playbook \
            -i inventories/pre/hosts \
            site.yml \
            -e "app_url=${APP_URL}"

      - name: Run Ansible Validation (PRO)
        if: github.ref == 'refs/heads/main'
        run: |
          ansible-playbook \
            -i inventories/pro/hosts \
            site.yml \
            -e "app_url=${APP_URL}"
