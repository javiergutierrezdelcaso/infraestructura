name: CI - Infraestructura

on:
  push:
    branches: ["develop", "main"]
  pull_request:

permissions:
  contents: read

jobs:

  terraform-ci:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: terraform
    env:
      ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
      ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
      ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
      ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}

      

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -recursive -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan PRE
        env:
          ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
          ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
          ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
        run: |
          terraform plan \
            -var="environment=pre" \
            -var="client_id=${ARM_CLIENT_ID}" \
            -var="client_secret=${ARM_CLIENT_SECRET}" \
            -var="tenant_id=${ARM_TENANT_ID}" \
            -var="subscription_id=${ARM_SUBSCRIPTION_ID}"

      - name: Install tfsec
        run: |
          curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash

      - name: Run tfsec
        run: tfsec .

      - name: Install Checkov
        run: pipx install checkov

      - name: Run Checkov
        run: checkov -d .

      - name: Install terraform-docs
        run: |
          curl -sSLo terraform-docs.tar.gz https://github.com/terraform-docs/terraform-docs/releases/download/v0.17.0/terraform-docs-v0.17.0-linux-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz
          sudo mv terraform-docs /usr/local/bin/

      - name: Generate Terraform Docs
        run: terraform-docs markdown table . > README.md

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//')_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/gitleaks


      - name: Run Gitleaks
        run: gitleaks detect --source .

  ansible-ci:
    runs-on: ubuntu-latest
    needs: terraform-ci
    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible + linters
        run: |
          sudo apt update
          sudo apt install -y ansible yamllint pipx
          pipx ensurepath
          pipx install ansible-lint

      - name: Lint YAML
        run: yamllint .

      - name: Lint Ansible
        run: ansible-lint .

      - name: Test PRE inventory
        run: ansible all -i inventories/pre/hosts -m ping

      - name: Test PRO inventory
        run: ansible all -i inventories/pro/hosts -m ping

      - name: Syntax Check PRE
        run: ansible-playbook --syntax-check site.yml -i inventories/pre/hosts

      - name: Syntax Check PRO
        run: ansible-playbook --syntax-check site.yml -i inventories/pro/hosts

      - name: Idempotency Check PRE (1st run)
        run: ansible-playbook site.yml -i inventories/pre/hosts --check

      - name: Idempotency Check PRE (2nd run)
        run: ansible-playbook site.yml -i inventories/pre/hosts --check

      - name: Idempotency Check PRO (1st run)
        run: ansible-playbook site.yml -i inventories/pro/hosts --check

      - name: Idempotency Check PRO (2nd run)
        run: ansible-playbook site.yml -i inventories/pro/hosts --check